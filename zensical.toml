[project]
site_name = "gmm-divergence"
site_description = "A new project generated from the default template project."
site_author = "David Axelsson"
repo_url = "https://github.com/davaxe/gmm-divergence"
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]
site_url = "https://davaxe.github.io/gmm-divergence/"
nav = [
  { "Get started" = [
      "index.md",
      { "Getting started" = "getting_started.md" },
      { "KL estimation" = "kl_estimation.md" },
      { "Mixture optimization" = "fit_weights.md" }
  ]
  },
  { "API reference" = [
      "reference/index.md",
      { "Top-level API" = "reference/root.md" },
      { "Namespaces" = [
      { "Distributions" = "reference/distributions.md" },
      { "Divergence" = "reference/divergence.md" },
      { "Fitting" = "reference/fitting.md" },
      { "Sampling" = "reference/sampling.md" },
      { "Covariance" = "reference/covariance.md" }
      ]}
  ]
  },
]

[project.theme.icon]
logo = "lucide/waypoints"
repo = "fontawesome/brands/github"

[project.extra.version]
provider = "mike"

[project.theme]
variant = "modern"
language = "en"
features = [
    "navigation.tabs",
    "navigation.tabs.sticky",
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    # "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.instant.preview",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src/gmm_divergence"]

[project.plugins.mkdocstrings.handlers.python.options]
allow_inspection = true
docstring_section_style = "list"
docstring_style = "auto"
inherited_members = true
line_length = 80
separate_signature = true
show_root_heading = true
show_symbol_type_heading = true
show_signature_annotations = true
show_bases = true
show_source = true
show_symbol_type_toc = true
signature_crossrefs = true
show_if_no_docstring = false
merge_init_into_class = true
show_root_full_path = false
modernize_annotations = true
unwrap_annotated = true
filters = ["!^__.*__$", "!^_.*"]
